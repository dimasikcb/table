<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Турнирная сетка</title>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; overflow-x: auto; }
        .round { min-width: 200px; }
        .match { background: #16202c; padding: 10px; margin-bottom: 12px; border-left: 4px solid #3a7bd5; border-radius: 5px; }
        .player { padding: 6px; background: rgba(255,255,255,0.05); margin: 3px 0; border-radius: 3px; font-size: 14px; }
        .winner-highlight { border-left: 3px solid #10b981; background: rgba(16, 185, 129, 0.15); font-weight: bold; }
        h3 { color: #4cc9f0; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="round"><h3>Раунд 1</h3>
            <script>for(let i=1; i<=12; i++) document.write(`<div class="match" id="match-${i}"><div class="player">—</div><div class="player">—</div></div>`);</script>
        </div>
        <div class="round"><h3>Раунд 2 (Лузеры)</h3>
            <script>for(let i=13; i<=18; i++) document.write(`<div class="match" id="match-${i}"><div class="player">—</div><div class="player">—</div></div>`);</script>
        </div>
        <div class="round"><h3>Раунд 3</h3>
            <script>for(let i=19; i<=21; i++) document.write(`<div class="match" id="match-${i}"><div class="player">—</div><div class="player">—</div></div>`);</script>
        </div>
        <div class="round"><h3>Финал</h3>
            <script>for(let i=22; i<=24; i++) document.write(`<div class="match" id="match-${i}"><div class="player">—</div><div class="player">—</div></div>`);</script>
        </div>
    </div>

    <script>
        async function syncData() {
            try {
                const res = await fetch("https://api.sheety.co/476209bbc3bc43d3df2be3ea4f33f395/bd/matches");
                const data = await res.json();
                data.matches.forEach(m => {
                    const el = document.getElementById(`match-${m.id}`);
                    if (el) {
                        const p = el.querySelectorAll('.player');
                        if (m.player1) p[0].textContent = m.player1;
                        if (m.player2) p[1].textContent = m.player2;
                        
                        p.forEach(x => x.classList.remove('winner-highlight'));
                        if (m.winner) {
                            p.forEach(x => { if (x.textContent.trim() === m.winner.trim()) x.classList.add('winner-highlight'); });
                        }
                    }
                });
            } catch (e) { console.error("Ошибка синхронизации"); }
        }
        syncData();
        setInterval(syncData, 5000);
    </script>
</body>
</html>
