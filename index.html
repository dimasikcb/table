<!DOCTYPE html>
<html>
<head>
    <style>
        .match { background: #16202c; padding: 10px; margin: 5px; border-left: 4px solid #4cc9f0; color: white; width: 200px; }
        .player { padding: 5px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <!-- Всего 8 матчей для теста -->
    <div id="match-1" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-2" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-3" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-4" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-5" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-6" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-7" class="match"><div class="player">—</div><div class="player">—</div></div>
    <div id="match-8" class="match"><div class="player">—</div><div class="player">—</div></div>

    <script>
        async function update() {
            const res = await fetch("https://api.sheety.co/476209bbc3bc43d3df2be3ea4f33f395/bd/matches");
            const data = await res.json();
            data.matches.forEach(m => {
                const el = document.getElementById(`match-${m.id}`);
                if (el) {
                    const p = el.querySelectorAll('.player');
                    p[0].textContent = m.player1 || '—';
                    p[1].textContent = m.player2 || '—';
                }
            });
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>
